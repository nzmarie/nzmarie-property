name: Backfill Property Details

on:
  workflow_dispatch:
    inputs:
      suburbs:
        description: "Suburbs to backfill (comma-separated, or 'all' for entire database)"
        required: true
        default: "Northcross"
        type: string
      region:
        description: "Region to backfill"
        required: false
        default: "auckland"
        type: choice
        options:
          - auckland
          - wellington
      max_runtime_hours:
        description: "Max runtime (hours)"
        required: false
        default: "5.5"
        type: string

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROPERTY_VALUE_BASE_URL: ${{ secrets.PROPERTY_VALUE_BASE_URL }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          python database/scripts/run_migrations.py

      - name: Run Backfill Mode
        run: |
          SUBURBS="${{ inputs.suburbs }}"
          REGION="${{ inputs.region || 'auckland' }}"
          MAX_RUNTIME="${{ inputs.max_runtime_hours || '5.5' }}"

          echo "========================================="
          echo "🔄 Starting BACKFILL mode"
          echo "========================================="
          echo "Region:      $REGION"
          echo "Suburbs:     $SUBURBS"
          echo "Max runtime: ${MAX_RUNTIME} hours"
          echo "Fills:       bedrooms, bathrooms, images, description, RV, sold price, etc."
          echo "========================================="

          # Build args — omit --suburbs entirely when input is 'all' so the
          # scraper processes every record in the region that is missing data
          ARGS=(--mode backfill --region "$REGION" --max_runtime "$MAX_RUNTIME" --force)
          if [ "$SUBURBS" != "all" ] && [ -n "$SUBURBS" ]; then
            ARGS+=(--suburbs "$SUBURBS")
          fi

          python scrapers/property_value_engine.py "${ARGS[@]}"

          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo ""
            echo "========================================="
            echo "✅ Backfill completed successfully"
            echo "========================================="
          else
            echo ""
            echo "========================================="
            echo "❌ Backfill failed with exit code $EXIT_CODE"
            echo "========================================="
            exit $EXIT_CODE
          fi

      - name: Show completion summary
        if: success()
        run: |
          echo ""
          echo "========================================="
          echo "🎉 Backfill complete!"
          echo "========================================="
          echo ""
          echo "Fields populated:"
          echo "  ✅ cover_image_url  (property photo)"
          echo "  ✅ images           (all photos JSONB)"
          echo "  ✅ description      (story-content paragraphs)"
          echo "  ✅ bedrooms / bathrooms / car_spaces"
          echo "  ✅ floor_size / land_area"
          echo "  ✅ capital_value / land_value / improvement_value"
          echo "  ✅ last_sold_price / last_sold_date"
          echo "  ✅ estimated_value_low / high"
          echo "  ✅ latitude / longitude"
          echo ""
          echo "Verify: check frontend property cards for images and data."
          echo "========================================="

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backfill-error-screenshots
          path: screenshots/
          retention-days: 7
