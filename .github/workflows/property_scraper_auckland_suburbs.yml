name: Property Engine (Auckland North Shore Suburbs)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraping Mode"
        required: true
        default: "discovery"
        type: choice
        options:
          - discovery
          - backfill
          - refresh
      suburbs:
        description: "Suburbs to scrape"
        required: true
        default: "Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany"
        type: string
      force_run:
        description: "Force run"
        type: boolean
        required: false
        default: false

  # schedule:
  #   - cron: "0 0 * * *"  # Disabled — manual trigger only

permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    concurrency:
      group: property-engine-auckland-suburbs
      cancel-in-progress: true

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROPERTY_VALUE_BASE_URL: ${{ secrets.PROPERTY_VALUE_BASE_URL }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          python database/migrations/001_add_property_fingerprint_unique.py
          python database/migrations/003_add_sale_status_and_valuations.py
          python database/migrations/004_add_images_column.py
          python database/migrations/005_add_location_columns.py

      - name: Determine Task ID
        id: task_id
        run: |
          echo "task_id=12" >> $GITHUB_OUTPUT

      - name: Check and acquire lock
        id: check_lock
        env:
          FORCE_RUN: ${{ inputs.force_run }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$FORCE_RUN" = "true" ]; then FORCE_FLAG="--force"; fi
          python database/scripts/gh_lock_manager.py --action check --task-id ${{ steps.task_id.outputs.task_id }} $FORCE_FLAG

      - name: Set status to running
        if: steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action running --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Run Discovery Mode
        if: steps.check_lock.outputs.should_run == 'true' && inputs.mode == 'discovery'
        run: |
          SUBURBS_VAL="${{ inputs.suburbs || 'Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany' }}"
          
          echo "========================================="
          echo "🚀 Starting DISCOVERY mode"
          echo "========================================="
          echo "Suburbs: $SUBURBS_VAL"
          echo "Max runtime: 1.8 hours"
          echo "========================================="
          
          python scrapers/property_value_engine.py \
            --mode discovery \
            --region auckland \
            --task_id ${{ steps.task_id.outputs.task_id }} \
            --max_runtime 1.8 \
            --suburbs "$SUBURBS_VAL" \
            ${{ inputs.force_run && '--force' || '' }}
          
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "❌ Discovery mode failed with exit code $EXIT_CODE"
            echo "========================================="
            exit $EXIT_CODE
          fi
          
          echo ""
          echo "========================================="
          echo "✅ Discovery mode completed successfully"
          echo "✅ Proceeding to backfill mode..."
          echo "========================================="

      - name: Run Backfill Mode (after discovery or standalone)
        if: steps.check_lock.outputs.should_run == 'true' && (inputs.mode == 'discovery' || inputs.mode == 'backfill')
        run: |
          SUBURBS_VAL="${{ inputs.suburbs || 'Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany' }}"
          
          echo ""
          echo "========================================="
          echo "🔄 Starting BACKFILL mode"
          echo "========================================="
          echo "Suburbs: $SUBURBS_VAL"
          echo "Max runtime: 1.8 hours"
          echo "========================================="
          
          # Run backfill without task_id to avoid lock conflicts
          # Use --force to skip lock check entirely
          python scrapers/property_value_engine.py \
            --mode backfill \
            --region auckland \
            --suburbs "$SUBURBS_VAL" \
            --max_runtime 1.8 \
            --force
          
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "❌ Backfill mode failed with exit code $EXIT_CODE"
            echo "========================================="
            exit $EXIT_CODE
          fi
          
          echo ""
          echo "========================================="
          echo "✅ Backfill mode completed successfully"
          echo "========================================="

      - name: Run Refresh Mode
        if: steps.check_lock.outputs.should_run == 'true' && inputs.mode == 'refresh'
        run: |
          SUBURBS_VAL="${{ inputs.suburbs || 'Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany' }}"
          
          echo "========================================="
          echo "🔄 Starting REFRESH mode"
          echo "========================================="
          echo "Suburbs: $SUBURBS_VAL"
          echo "Max runtime: 1.8 hours"
          echo "========================================="
          
          python scrapers/property_value_engine.py \
            --mode refresh \
            --region auckland \
            --task_id ${{ steps.task_id.outputs.task_id }} \
            --max_runtime 1.8 \
            --suburbs "$SUBURBS_VAL" \
            ${{ inputs.force_run && '--force' || '' }}
          
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo ""
            echo "========================================="
            echo "❌ Refresh mode failed with exit code $EXIT_CODE"
            echo "========================================="
            exit $EXIT_CODE
          fi
          
          echo ""
          echo "========================================="
          echo "✅ Refresh mode completed successfully"
          echo "========================================="

      - name: Reset status
        if: always() && steps.check_lock.outputs.should_run == 'true'
        run: |
          python database/scripts/gh_lock_manager.py --action reset --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Show completion summary
        if: success() && (inputs.mode == 'discovery' || inputs.mode == 'backfill')
        run: |
          echo ""
          echo "========================================="
          echo "🎉 Workflow completed successfully!"
          echo "========================================="
          echo ""
          echo "📊 What was done:"
          if [ "${{ inputs.mode }}" == "discovery" ]; then
            echo "   1. ✅ Discovery: Collected property addresses"
            echo "   2. ✅ Backfill: Populated detailed data (images, beds, RV, etc.)"
          else
            echo "   ✅ Backfill: Populated detailed data (images, beds, RV, etc.)"
          fi
          echo ""
          echo "🔍 Verify data:"
          echo "   1. Check your frontend property cards"
          echo "   2. Confirm images are displayed"
          echo "   3. Confirm RV, bedrooms, bathrooms are filled"
          echo ""
          echo "========================================="

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-auckland-suburbs
          path: screenshots/
          retention-days: 7
