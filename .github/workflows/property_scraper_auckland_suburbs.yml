name: Property Engine (Auckland North Shore Suburbs)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraping Mode"
        required: true
        default: "discovery"
        type: choice
        options:
          - discovery
          - backfill
          - refresh
      suburbs:
        description: "Suburbs to scrape"
        required: true
        default: "Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany"
        type: string
      force_run:
        description: "Force run"
        type: boolean
        required: false
        default: false

  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    concurrency:
      group: property-engine-auckland-suburbs
      cancel-in-progress: true

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROPERTY_VALUE_BASE_URL: ${{ secrets.PROPERTY_VALUE_BASE_URL }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          python database/migrations/001_add_property_fingerprint_unique.py
          python database/migrations/003_add_sale_status_and_valuations.py

      - name: Determine Task ID
        id: task_id
        run: |
          echo "task_id=12" >> $GITHUB_OUTPUT

      - name: Check and acquire lock
        id: check_lock
        env:
          FORCE_RUN: ${{ inputs.force_run }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$FORCE_RUN" = "true" ]; then FORCE_FLAG="--force"; fi
          python database/scripts/gh_lock_manager.py --action check --task-id ${{ steps.task_id.outputs.task_id }} $FORCE_FLAG

      - name: Set status to running
        if: steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action running --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Run Property Scraper
        if: steps.check_lock.outputs.should_run == 'true'
        run: |
          MODE="${{ inputs.mode || 'discovery' }}"
          ARGS=("--mode" "$MODE" "--region" "auckland" "--task_id" "${{ steps.task_id.outputs.task_id }}" "--max_runtime" "1.8")
          if [ "${{ inputs.force_run }}" = "true" ]; then
            ARGS+=("--force")
          fi
          SUBURBS_VAL="${{ inputs.suburbs || 'Northcross,Oteha,Torbay,Fairview Heights,Waiake,Browns Bay,Pinehill,Rothesay Bay,Murrays Bay,Albany' }}"
          if [ -n "$SUBURBS_VAL" ]; then
            ARGS+=("--suburbs" "$SUBURBS_VAL")
          fi
          
          echo "========================================="
          echo "🚀 Starting ${MODE} mode"
          echo "========================================="
          python scrapers/property_value_engine.py "${ARGS[@]}"
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ ${MODE} mode failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          
          if [ "$MODE" = "discovery" ]; then
            echo ""
            echo "========================================="
            echo "🔄 Auto-starting BACKFILL mode after discovery"
            echo "========================================="
            BACKFILL_ARGS=("--mode" "backfill" "--region" "auckland" "--task_id" "${{ steps.task_id.outputs.task_id }}" "--max_runtime" "1.8")
            if [ -n "$SUBURBS_VAL" ]; then
              BACKFILL_ARGS+=("--suburbs" "$SUBURBS_VAL")
            fi
            python scrapers/property_value_engine.py "${BACKFILL_ARGS[@]}"
            BACKFILL_EXIT=$?
            if [ $BACKFILL_EXIT -ne 0 ]; then
              echo "❌ Backfill mode failed with exit code $BACKFILL_EXIT"
              exit $BACKFILL_EXIT
            fi
          fi

      - name: Reset status
        if: always() && steps.check_lock.outputs.should_run == 'true'
        run: |
          python database/scripts/gh_lock_manager.py --action reset --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-auckland-suburbs
          path: screenshots/
          retention-days: 7
