name: RealEstate Scraper (Auckland)

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force run? (skip lock check, preserve page progress)"
        required: false
        type: boolean
        default: false
      reset_progress:
        description: "Reset page progress to 0? (re-scrape from page 1)"
        required: false
        type: boolean
        default: false
      delete_existing:
        description: "Delete ALL existing real_estate records before scraping? (full re-scrape)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    concurrency:
      group: scrape-realestate-auckland
      cancel-in-progress: false

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REALESTATE_URL: https://www.realestate.co.nz
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          python database/migrations/006_add_real_estate_property_type.py

      - name: Delete existing real_estate records (full re-scrape)
        if: inputs.delete_existing == true
        run: |
          echo "🗑️  Deleting all existing real_estate records..."
          python -c "
          import sys; sys.path.append('.')
          from utils.database import db
          result = db.execute('DELETE FROM real_estate')
          print('✅ Deleted all real_estate records. Starting fresh.')
          "

      - name: Full progress reset (re-scrape from page 0)
        if: inputs.reset_progress == true || inputs.delete_existing == true
        run: |
          echo "🔄 Resetting page progress to 0..."
          python database/scripts/gh_lock_manager.py --action reset-progress --task-id 2

      - name: Check and acquire lock
        id: check_lock
        env:
          FORCE_RUN: ${{ inputs.force_run }}
        run: |
          FORCE_FLAG=""
          if [ "$FORCE_RUN" = "true" ]; then FORCE_FLAG="--force"; fi
          python database/scripts/gh_lock_manager.py --action check --task-id 2 $FORCE_FLAG

      - name: Set status to running
        if: steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action running --task-id 2

      - name: Run scraper (auckland)
        if: steps.check_lock.outputs.should_run == 'true'
        run: python real_estate_auckland.py --task_id 2

      - name: Reset status on completion or failure
        if: always() && steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action reset --task-id 2

      - name: Trigger next run if timed out (Breakpoint Resume)
        if: success() && steps.check_lock.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(python -c "
          import sys; sys.path.append('.')
          from utils.database import db
          rows = db.query('SELECT status FROM scraping_progress WHERE id = %s', (2,))
          print(rows[0]['status'] if rows else 'unknown')
          ")

          if [ "$STATUS" = "idle" ]; then
            echo "Task 2 is 'idle' (timed out). Triggering next run to resume..."
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/real_estate_scraper_auckland.yml/dispatches \
              -d '{"ref":"main","inputs":{"force_run":"false","reset_progress":"false","delete_existing":"false"}}'
          elif [ "$STATUS" = "complete" ]; then
            echo "Task 2 is 'complete'. Scraping cycle finished!"
          else
            echo "Task 2 is '$STATUS'. No auto-trigger performed."
          fi

      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-auckland-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
