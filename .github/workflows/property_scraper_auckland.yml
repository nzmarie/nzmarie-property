name: Property Engine (Auckland)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraping Mode"
        required: true
        default: "discovery"
        type: choice
        options:
          - discovery
          - backfill
          - refresh
      suburbs:
        description: "Suburbs to scrape (comma-separated, empty=all)"
        required: false
        default: ""
        type: string
      force_run:
        description: "Force run? (Resets progress and starts fresh)"
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 660

    concurrency:
      group: property-engine-auckland
      cancel-in-progress: true

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROPERTY_VALUE_BASE_URL: ${{ secrets.PROPERTY_VALUE_BASE_URL }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run database migrations
        run: |
          python database/scripts/run_migrations.py

      - name: Determine Task ID
        id: task_id
        run: |
          TASK_ID=10
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          echo "Assigned Task ID $TASK_ID for auckland"

      - name: Check and acquire lock
        id: check_lock
        env:
          FORCE_RUN: ${{ inputs.force_run }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$FORCE_RUN" = "true" ]; then FORCE_FLAG="--force"; fi
          python database/scripts/gh_lock_manager.py --action check --task-id ${{ steps.task_id.outputs.task_id }} $FORCE_FLAG

      - name: Set status to running
        if: steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action running --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Run Discovery Mode
        id: discovery
        if: steps.check_lock.outputs.should_run == 'true' && inputs.mode == 'discovery'
        run: |
          SUBURBS="${{ inputs.suburbs }}"

          echo "========================================="
          echo "🚀 Starting DISCOVERY mode"
          echo "========================================="
          echo "Region: auckland"
          echo "Suburbs: ${SUBURBS:-all}"
          echo "Max runtime: 5 hours"
          echo "========================================="

          ARGS=(--mode discovery --region auckland --task_id ${{ steps.task_id.outputs.task_id }} --max_runtime 5)
          if [ "${{ inputs.force_run }}" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$SUBURBS" ]; then ARGS+=(--suburbs "$SUBURBS"); fi

          python scrapers/property_value_engine.py "${ARGS[@]}"

      - name: Run Backfill Mode (after discovery or standalone)
        if: |
          steps.check_lock.outputs.should_run == 'true'
          && (inputs.mode == 'backfill' || inputs.mode == 'discovery')
        run: |
          SUBURBS="${{ inputs.suburbs }}"

          echo ""
          echo "========================================="
          echo "🔄 Starting BACKFILL mode"
          echo "========================================="
          echo "Region: auckland"
          echo "Suburbs: ${SUBURBS:-all}"
          echo "Max runtime: 5 hours"
          echo "========================================="

          BACKFILL_ARGS=(--mode backfill --region auckland --task_id ${{ steps.task_id.outputs.task_id }} --max_runtime 5 --force)
          if [ -n "$SUBURBS" ]; then BACKFILL_ARGS+=(--suburbs "$SUBURBS"); fi

          python scrapers/property_value_engine.py "${BACKFILL_ARGS[@]}"

      - name: Run Refresh Mode
        if: steps.check_lock.outputs.should_run == 'true' && inputs.mode == 'refresh'
        run: |
          SUBURBS="${{ inputs.suburbs }}"

          echo "========================================="
          echo "🔄 Starting REFRESH mode"
          echo "========================================="
          echo "Region: auckland"
          echo "Suburbs: ${SUBURBS:-all}"
          echo "Max runtime: 5 hours"
          echo "========================================="

          ARGS=(--mode refresh --region auckland --task_id ${{ steps.task_id.outputs.task_id }} --max_runtime 5)
          if [ "${{ inputs.force_run }}" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$SUBURBS" ]; then ARGS+=(--suburbs "$SUBURBS"); fi

          python scrapers/property_value_engine.py "${ARGS[@]}"

      - name: Reset status
        if: always() && steps.check_lock.outputs.should_run == 'true'
        run: |
          python database/scripts/gh_lock_manager.py --action reset --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Trigger next run if not complete (Breakpoint Resume)
        if: always() && steps.check_lock.outputs.should_run == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(python -c "
          import sys, json; sys.path.append('.')
          from utils.database import db
          rows = db.query('SELECT status, last_processed_id FROM scraping_progress WHERE id = %s', (${{ steps.task_id.outputs.task_id }},))
          if not rows:
              print('NO_RECORD')
          else:
              status = rows[0]['status']
              state = rows[0].get('last_processed_id')
              if status == 'complete':
                  print('COMPLETE')
              elif state:
                  try:
                      s = json.loads(state)
                      if s.get('ta_idx', 0) > 0 or s.get('sub_idx', 0) > 0 or s.get('page_num', 1) > 1:
                          print('HAS_PROGRESS')
                      else:
                          print('NO_PROGRESS')
                  except:
                      print('NO_PROGRESS')
              else:
                  print('NO_PROGRESS')
          ")

          echo "Resume check result: $RESULT"

          if [ "$RESULT" = "COMPLETE" ]; then
            echo "✅ Task ${{ steps.task_id.outputs.task_id }} is complete. Scraping cycle finished!"
          elif [ "$RESULT" = "HAS_PROGRESS" ]; then
            NEXT_MODE="${{ inputs.mode }}"
            if [ "${{ inputs.mode }}" = "discovery" ]; then
              NEXT_MODE="backfill"
            fi
            echo "🔄 Task has saved progress. Triggering next run to resume from breakpoint in $NEXT_MODE mode..."
            curl -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token $GITHUB_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/property_scraper_auckland.yml/dispatches \
              -d "{\"ref\":\"main\",\"inputs\":{\"mode\":\"$NEXT_MODE\",\"suburbs\":\"${{ inputs.suburbs }}\",\"force_run\":\"false\"}}"
            echo "✅ Next run triggered to continue from breakpoint"
          else
            echo "Task has no saved progress. No auto-trigger performed."
          fi

      - name: Show completion summary
        if: success() && (inputs.mode == 'discovery' || inputs.mode == 'backfill')
        run: |
          echo ""
          echo "========================================="
          echo "🎉 Workflow completed successfully!"
          echo "========================================="
          echo ""
          echo "📊 What was done:"
          if [ "${{ inputs.mode }}" == "discovery" ]; then
            echo "   1. ✅ Discovery: Collected property addresses"
            echo "   2. ✅ Backfill: Populated detailed data (images, beds, RV, etc.)"
          else
            echo "   ✅ Backfill: Populated detailed data (images, beds, RV, etc.)"
          fi
          echo ""
          echo "🔍 Verify data:"
          echo "   1. Check your frontend property cards"
          echo "   2. Confirm images are displayed"
          echo "   3. Confirm RV, bedrooms, bathrooms are filled"
          echo ""
          echo "========================================="

      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-auckland
          path: screenshots/
          retention-days: 7
          if-no-files-found: warn
