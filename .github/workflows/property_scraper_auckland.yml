name: Property Engine (Auckland)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Scraping Mode"
        required: true
        default: "discovery"
        type: choice
        options:
          - discovery
          - backfill
          - refresh
      suburbs:
        description: "Suburbs to scrape (comma-separated, empty=all e.g. 'Northcross,Torbay,Beach Haven')"
        required: false
        default: ""
        type: string
      force_run:
        description: "Force run? (Resets status to idle)"
        type: boolean
        required: false
        default: false

  # schedule:
  #   - cron: '0 */6 * * *'  # Disabled — manual trigger only

permissions:
  contents: read
  actions: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 340

    concurrency:
      group: property-engine-auckland
      cancel-in-progress: true

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PROPERTY_VALUE_BASE_URL: ${{ secrets.PROPERTY_VALUE_BASE_URL }}
      PYTHONPATH: .
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Apply database schema
        run: |
          python database/scripts/apply_schema.py

      - name: Run database migrations
        run: |
          python database/migrations/001_add_property_fingerprint_unique.py
          python database/migrations/003_add_sale_status_and_valuations.py
          python database/migrations/004_add_images_column.py
          python database/migrations/005_add_location_columns.py

      - name: Determine Task ID
        id: task_id
        run: |
          MODE="${{ inputs.mode || 'discovery' }}"
          TASK_ID=10
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          echo "Assigned unified Task ID $TASK_ID for $MODE in auckland"

      - name: Check and acquire lock
        id: check_lock
        env:
          FORCE_RUN: ${{ inputs.force_run }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event_name }}" = "schedule" ] || [ "$FORCE_RUN" = "true" ]; then FORCE_FLAG="--force"; fi
          python database/scripts/gh_lock_manager.py --action check --task-id ${{ steps.task_id.outputs.task_id }} $FORCE_FLAG

      - name: Set status to running
        if: steps.check_lock.outputs.should_run == 'true'
        run: python database/scripts/gh_lock_manager.py --action running --task-id ${{ steps.task_id.outputs.task_id }}

      - name: Run Property Scraper (auckland)
        if: steps.check_lock.outputs.should_run == 'true'
        run: |
          MODE="${{ inputs.mode || 'discovery' }}"
          SUBURBS="${{ inputs.suburbs }}"

          echo "========================================="
          echo "🚀 Starting $MODE mode"
          echo "========================================="
          echo "Region: auckland"
          echo "Suburbs: ${SUBURBS:-all}"
          echo "Max runtime: 5.2 hours"
          echo "========================================="

          ARGS=(--mode "$MODE" --region auckland --task_id ${{ steps.task_id.outputs.task_id }} --max_runtime 5.2)
          if [ "${{ inputs.force_run }}" = "true" ]; then ARGS+=(--force); fi
          if [ -n "$SUBURBS" ]; then ARGS+=(--suburbs "$SUBURBS"); fi

          python scrapers/property_value_engine.py "${ARGS[@]}"

          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ $MODE mode failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          echo "✅ $MODE mode completed successfully"

          if [ "$MODE" = "discovery" ]; then
            echo ""
            echo "========================================="
            echo "🔄 Starting BACKFILL mode (auto after discovery)"
            echo "========================================="
            echo "Suburbs: ${SUBURBS:-all}"
            echo "Max runtime: 5.2 hours"
            echo "========================================="

            # Run backfill without task_id and with --force to avoid lock conflicts
            BACKFILL_ARGS=(--mode backfill --region auckland --max_runtime 5.2 --force)
            if [ -n "$SUBURBS" ]; then BACKFILL_ARGS+=(--suburbs "$SUBURBS"); fi

            python scrapers/property_value_engine.py "${BACKFILL_ARGS[@]}"

            EXIT_CODE=$?
            if [ $EXIT_CODE -ne 0 ]; then
              echo "❌ Backfill mode failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
            echo "✅ Backfill mode completed successfully"
          fi

      - name: Reset status on completion or failure
        if: always() && steps.check_lock.outputs.should_run == 'true'
        run: |
          python database/scripts/gh_lock_manager.py --action reset --task-id ${{ steps.task_id.outputs.task_id }}



      - name: Upload Error Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots-auckland
          path: screenshots/
          retention-days: 7
          if-no-files-found: warn
